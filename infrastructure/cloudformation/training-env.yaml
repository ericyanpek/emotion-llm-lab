AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Emotion Companion LLM fine-tune training environment.
  Provisions a GPU EC2 instance (g5.2xlarge + DLAMI) with zero public ports,
  SSM-only access, encrypted EBS, an S3 artifact bucket, and SSM Parameter Store
  entries for secrets. Modeled after the OpenClaw-on-Bedrock security baseline.

# =============================================================================
# METADATA
# =============================================================================
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Project
        Parameters:
          - ProjectName
          - Environment
      - Label:
          default: Compute
        Parameters:
          - InstanceType
          - UseSpotInstance
          - RootVolumeSizeGB
      - Label:
          default: Network (bring-your-own VPC)
        Parameters:
          - VpcId
          - SubnetId
      - Label:
          default: Cost guardrails
        Parameters:
          - AutoShutdownHours
          - EnableIdleAlarm
          - BudgetLimitUSD
          - BudgetNotificationEmail

# =============================================================================
# PARAMETERS
# =============================================================================
Parameters:
  ProjectName:
    Type: String
    Default: emotion-companion
    Description: Short project name used for tagging and resource naming.
    AllowedPattern: '^[a-z][a-z0-9-]{2,30}$'
    ConstraintDescription: lowercase, digits, hyphens; 3-31 chars; must start with letter.

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Environment name (affects tags and retention).

  InstanceType:
    Type: String
    Default: g5.2xlarge
    AllowedValues:
      - g5.xlarge       # 1x A10G 24GB, 4 vCPU, 16GB RAM  (~$1.0/hr)
      - g5.2xlarge      # 1x A10G 24GB, 8 vCPU, 32GB RAM  (~$1.2/hr) recommended
      - g5.4xlarge      # 1x A10G 24GB, 16 vCPU, 64GB RAM (~$1.6/hr) for larger datasets
      - g6.2xlarge      # 1x L4 24GB, newer arch          (~$1.0/hr) alternative
      - g6e.2xlarge     # 1x L40S 48GB, headroom for 14B  (~$2.2/hr) upgrade path
    Description: GPU instance type. g5.2xlarge is the recommended default for Qwen3-8B QLoRA.

  UseSpotInstance:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >
      Use Spot for ~70% cost reduction. Spot can be interrupted; LLaMA-Factory
      checkpoints support resume but start with On-Demand for PoC simplicity.

  RootVolumeSizeGB:
    Type: Number
    Default: 500
    MinValue: 200
    MaxValue: 2000
    Description: >
      EBS size in GB. Must hold base model (~16GB), datasets, multiple checkpoints,
      and HF cache. 500GB is comfortable for PoC; 1TB if keeping many experiments.

  # -----------------------------------------------------------------------
  # Networking: BYO VPC/Subnet
  #
  # We use existing VPC + Subnet rather than creating new ones, for two
  # reasons:
  #  - Shared AWS accounts often hit the 5-VPC soft limit; creating yet another
  #    VPC per PoC stack is antisocial
  #  - The default VPC in every region is already wired for public subnets
  #    with an internet gateway and routes, matching our network needs
  # The instance security group still has ZERO inbound rules, so sharing a
  # VPC with other workloads does not reduce our security posture.
  # -----------------------------------------------------------------------
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: >
      Existing VPC to launch the instance in. In most accounts you can use
      the default VPC; list with: aws ec2 describe-vpcs --filters Name=isDefault,Values=true

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: >
      Existing subnet in the chosen VPC. Must be in an AZ that offers the
      target instance type (for g5.2xlarge in us-east-1: a/b/c/d/f). A public
      subnet (MapPublicIpOnLaunch=true) is easiest; for a private subnet the
      stack still works but requires VPC endpoints for SSM/S3 you set up
      out-of-band.

  AutoShutdownHours:
    Type: Number
    Default: 1
    MinValue: 0
    MaxValue: 72
    Description: >
      Layer 1 auto-shutdown: on-instance cron stops the instance after N idle
      hours (0 disables). Idle = GPU util <5% AND GPU memory <1GB AND no
      active SSM sessions. Default 1h keeps PoC costs predictable; raise for
      long overnight runs.

  EnableIdleAlarm:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: >
      Layer 2 auto-shutdown: CloudWatch alarm stops the instance when
      GPUUtilization < 5% for 60 minutes. Runs independently of the on-instance
      cron so an OS-level hang doesn't leave the GPU burning money. ~$0.10/mo.

  BudgetLimitUSD:
    Type: Number
    Default: 200
    MinValue: 10
    Description: Monthly AWS Budget limit in USD. Triggers email alert at 80% / 100%.

  BudgetNotificationEmail:
    Type: String
    Default: ''
    Description: Email for budget alerts (leave empty to skip budget alarm creation).
    AllowedPattern: '^$|^[^@]+@[^@]+\.[^@]+$'

  # Latest DLAMI (PyTorch 2.7, Ubuntu 22.04, NVIDIA driver pre-installed).
  # CloudFormation resolves this SSM public parameter at stack-create time.
  LatestDlamiSsmParam:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/deeplearning/ami/x86_64/oss-nvidia-driver-gpu-pytorch-2.7-ubuntu-22.04/latest/ami-id
    Description: Public SSM parameter pointing to the latest DLAMI GPU AMI.

  LlamaFactoryRef:
    Type: String
    # Pinned to the v0.9.4 release commit (Apr 2026). Using a full SHA rather
    # than the 'v0.9.4' tag so the ref is guaranteed immutable. Bump via a
    # `make bootstrap` with LLAMA_FACTORY_REF=<newer-sha>, then commit the new
    # default here once validated.
    Default: 95ac3f2373b82662c1bd855c284d3379e6a763d3
    Description: >
      LLaMA-Factory git ref (commit SHA, tag, or branch). Default is the pinned
      v0.9.4 release SHA for reproducibility. Override per-run with
      LLAMA_FACTORY_REF=<ref> make bootstrap.

# =============================================================================
# CONDITIONS
# =============================================================================
Conditions:
  UseSpot: !Equals [!Ref UseSpotInstance, 'true']
  HasBudgetEmail: !Not [!Equals [!Ref BudgetNotificationEmail, '']]
  # Note: AutoShutdownHours is consumed in the UserData bash directly; no CFN condition needed.
  EnableIdleAlarmCond: !Equals [!Ref EnableIdleAlarm, 'true']

# =============================================================================
# RESOURCES
# =============================================================================
Resources:

  # ---------------------------------------------------------------------------
  # Networking: BYO existing VPC + Subnet via parameters (VpcId, SubnetId).
  # This stack does NOT create a VPC because shared AWS accounts frequently
  # hit the 5-VPC soft limit. Our security posture (zero-inbound SG,
  # SSM-only access) does not depend on VPC isolation.
  # ---------------------------------------------------------------------------

  # ---------------------------------------------------------------------------
  # Security Group: ZERO inbound. Egress scoped to the ports actually needed:
  #   - 443/TCP: Hugging Face Hub, pip/PyPI, S3, SSM, CloudWatch, Bedrock, etc.
  #   - 80/TCP:  package mirror redirects (most 80 redirects to 443, but some
  #              apt mirrors still answer on 80)
  #   - 53/UDP + 53/TCP: DNS resolution
  #   - 123/UDP: NTP (chrony) time sync
  # Access to local services like Gradio webui happens ONLY via SSM port
  # forwarding, never via SG ingress. Matches the OpenClaw security baseline.
  # ---------------------------------------------------------------------------
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub ${ProjectName} training instance - zero inbound, all access via SSM
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS outbound (HF Hub, pip, S3, SSM, CloudWatch)
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP outbound (apt mirrors, redirects)
        - IpProtocol: udp
          FromPort: 53
          ToPort: 53
          CidrIp: 0.0.0.0/0
          Description: DNS outbound (UDP)
        - IpProtocol: tcp
          FromPort: 53
          ToPort: 53
          CidrIp: 0.0.0.0/0
          Description: DNS outbound (TCP fallback)
        - IpProtocol: udp
          FromPort: 123
          ToPort: 123
          CidrIp: 0.0.0.0/0
          Description: NTP time sync
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-sg
        - Key: NoIngress
          Value: 'true'

  # ---------------------------------------------------------------------------
  # S3 access log bucket. Separate bucket per AWS best practice — S3 logging
  # cannot write to the same bucket it audits.
  # ---------------------------------------------------------------------------
  AccessLogBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub ${ProjectName}-${Environment}-accesslogs-${AWS::AccountId}-${AWS::Region}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          # S3 log delivery still requires ACLs; use BucketOwnerPreferred so the
          # logging service can write, but account owner takes ownership.
          - ObjectOwnership: BucketOwnerPreferred
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldLogs
            Status: Enabled
            ExpirationInDays: 90
          - Id: AbortIncompleteMultipartUpload
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Purpose
          Value: s3-access-logs

  # ---------------------------------------------------------------------------
  # S3 bucket for datasets + LoRA adapter artifacts.
  # SSE-S3 encryption, public access blocked, versioning on, access logged.
  # ---------------------------------------------------------------------------
  ArtifactBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub ${ProjectName}-${Environment}-artifacts-${AWS::AccountId}-${AWS::Region}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      LoggingConfiguration:
        DestinationBucketName: !Ref AccessLogBucket
        LogFilePrefix: artifacts/
      # Deliberately NOT enabled for this PoC (document your reasoning if you
      # change posture later):
      #   - ObjectLockEnabled: PoC needs to overwrite adapter iterations freely.
      #     Enable for production model registries.
      #   - ReplicationConfiguration: Cross-region replication is enterprise
      #     DR posture. Training artifacts are reproducible from code + data.
      LifecycleConfiguration:
        Rules:
          - Id: AbortIncompleteMultipartUpload
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
          - Id: TransitionOldCheckpointsToIA
            Status: Enabled
            Prefix: checkpoints/
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 30
              - StorageClass: GLACIER
                TransitionInDays: 90
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  ArtifactBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ArtifactBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !GetAtt ArtifactBucket.Arn
              - !Sub ${ArtifactBucket.Arn}/*
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  # ---------------------------------------------------------------------------
  # SSM Parameter Store placeholders for secrets (HF token, wandb key).
  # Values set to placeholder; operator updates post-deploy via CLI.
  # Using String (not SecureString) because CFN doesn't support SecureString
  # creation; operator promotes to SecureString out-of-band or via custom res.
  # For PoC we keep them as String but will overwrite with `aws ssm put-parameter
  # --type SecureString --overwrite` after stack creates.
  # ---------------------------------------------------------------------------
  HfTokenParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/${Environment}/hf-token
      Type: String
      Value: CHANGE_ME_AFTER_STACK_CREATION
      Description: Hugging Face access token. Replace with SecureString after stack creation.
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment

  WandbApiKeyParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /${ProjectName}/${Environment}/wandb-api-key
      Type: String
      Value: CHANGE_ME_AFTER_STACK_CREATION
      Description: Weights & Biases API key (optional, for training observability).
      Tags:
        Project: !Ref ProjectName
        Environment: !Ref Environment

  # ---------------------------------------------------------------------------
  # IAM: instance role with least-privilege-ish scope.
  # Grants: SSM managed core (SSM Session Manager), S3 access to artifact bucket,
  # read on SSM parameters under /<project>/<env>/*, CloudWatch logs write.
  # ---------------------------------------------------------------------------
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-instance-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # Required for SSM Session Manager + port forwarding.
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        # CloudWatch agent for basic instance metrics (mem, disk).
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: ArtifactBucketAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub ${ArtifactBucket.Arn}/*
        - PolicyName: ProjectParameterStoreRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource:
                  - !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/${Environment}/*
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub ${ProjectName}-${Environment}-instance-profile
      Roles:
        - !Ref InstanceRole

  # ---------------------------------------------------------------------------
  # Launch template: IMDSv2 required, encrypted EBS, SSM/DLAMI.
  # User data installs CloudWatch agent, LLaMA-Factory, and common tooling.
  # ---------------------------------------------------------------------------
  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub ${ProjectName}-${Environment}-lt
      LaunchTemplateData:
        ImageId: !Ref LatestDlamiSsmParam
        InstanceType: !Ref InstanceType
        # `shutdown -h` inside the instance (Layer 1 auto-shutdown cron) stops
        # the instance rather than terminating it. Explicit > relying on default.
        InstanceInitiatedShutdownBehavior: stop
        IamInstanceProfile:
          Arn: !GetAtt InstanceProfile.Arn
        # IMDSv2 required (no v1 fallback). Matches OpenClaw hardening.
        MetadataOptions:
          HttpTokens: required
          HttpEndpoint: enabled
          HttpPutResponseHopLimit: 2
        BlockDeviceMappings:
          - DeviceName: /dev/sda1
            Ebs:
              VolumeSize: !Ref RootVolumeSizeGB
              VolumeType: gp3
              Iops: 3000
              Throughput: 250
              Encrypted: true
              DeleteOnTermination: true
        NetworkInterfaces:
          - DeviceIndex: 0
            AssociatePublicIpAddress: true
            Groups:
              - !Ref InstanceSecurityGroup
            SubnetId: !Ref SubnetId
        InstanceMarketOptions: !If
          - UseSpot
          - MarketType: spot
            SpotOptions:
              SpotInstanceType: one-time
              InstanceInterruptionBehavior: stop
          - !Ref AWS::NoValue
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub ${ProjectName}-${Environment}-training
              - Key: Project
                Value: !Ref ProjectName
              - Key: Environment
                Value: !Ref Environment
              - Key: AutoShutdown
                Value: !Ref AutoShutdownHours
          - ResourceType: volume
            Tags:
              - Key: Name
                Value: !Sub ${ProjectName}-${Environment}-root
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            # =============================================================
            # MINIMAL BOOTSTRAP — keep this intentionally small.
            #
            # Heavy work (LLaMA-Factory, vLLM, model downloads) happens via
            # the separate SSM Document triggered by `make bootstrap` after
            # the instance is Running. See:
            #   infrastructure/cloudformation/bootstrap-document.yaml
            #   infrastructure/scripts/bootstrap.sh
            #
            # Rationale: UserData failures are silent to CloudFormation and
            # cannot be retried without recreating the instance. Anything
            # fragile (pip installs, GPU driver-dependent builds) belongs
            # in SSM Documents where we get structured exit codes, retries,
            # and CloudWatch Logs output.
            # =============================================================
            set -euo pipefail
            exec > >(tee -a /var/log/user-data.log) 2>&1

            echo "=== ${ProjectName} minimal bootstrap: $(date -u) ==="

            # Project-scoped env vars for every login shell.
            cat >/etc/profile.d/project.sh <<EOF
            export ARTIFACT_BUCKET="${ArtifactBucket}"
            export PROJECT_NAME="${ProjectName}"
            export PROJECT_ENV="${Environment}"
            export AWS_DEFAULT_REGION="${AWS::Region}"
            EOF
            chmod 0644 /etc/profile.d/project.sh

            # CloudWatch agent — mem/disk/GPU metrics + ship /var/log/user-data.log.
            cat >/opt/aws/amazon-cloudwatch-agent/etc/config.json <<'EOF'
            {
              "metrics": {
                "namespace": "EmotionCompanion",
                "metrics_collected": {
                  "mem":  { "measurement": ["mem_used_percent"] },
                  "disk": { "measurement": ["used_percent"], "resources": ["/"] },
                  "nvidia_gpu": {
                    "measurement": [
                      "utilization_gpu", "utilization_memory",
                      "memory_used", "memory_total", "temperature_gpu"
                    ]
                  }
                },
                "append_dimensions": { "InstanceId": "${!aws:InstanceId}" }
              },
              "logs": {
                "logs_collected": {
                  "files": {
                    "collect_list": [
                      { "file_path": "/var/log/user-data.log",
                        "log_group_name": "/emotion-companion/${Environment}/user-data",
                        "log_stream_name": "{instance_id}" },
                      { "file_path": "/var/log/amazon/ssm/amazon-ssm-agent.log",
                        "log_group_name": "/emotion-companion/${Environment}/ssm-agent",
                        "log_stream_name": "{instance_id}" }
                    ]
                  }
                }
              }
            }
            EOF
            /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
              -a fetch-config -m ec2 -s \
              -c file:/opt/aws/amazon-cloudwatch-agent/etc/config.json || true

            # Layer 1: on-instance auto-shutdown cron.
            # Idle = GPU util <5% AND GPU memory <1GB AND no active SSM session.
            # The SSM session guard matters: if you're tunneled into the box
            # looking at webui, we don't want to stop under your feet.
            #
            # NOTE: this whole block is rendered by CFN Fn::Sub. Any literal
            # bash variable reference must use the CFN bang-escape form so CFN
            # emits the literal rather than resolving it as a stack parameter.
            # Shell variables inside the heredoc body all use the escaped form.
            if [ "${AutoShutdownHours}" -gt 0 ]; then
              cat >/usr/local/bin/auto-shutdown-check.sh <<'EOF'
            #!/bin/bash
            # Invoked every 15 minutes via /etc/cron.d/auto-shutdown.
            # Accumulates idle time in /var/run/idle-since (tmpfs; lost on
            # reboot — which is fine, a fresh boot restarts the clock).
            set -u
            STATE=/var/run/idle-since
            THRESHOLD_HOURS=__HOURS__

            # GPU utilization (%). Uses nvidia-smi; missing driver → treat as 0.
            GPU_UTIL=$(nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader,nounits 2>/dev/null | head -1 || echo 0)
            GPU_UTIL=${!GPU_UTIL// /}
            # GPU memory used (MiB).
            GPU_MEM=$(nvidia-smi --query-gpu=memory.used --format=csv,noheader,nounits 2>/dev/null | head -1 || echo 0)
            GPU_MEM=${!GPU_MEM// /}
            # Active SSM port-forward or shell sessions (there's always 1+ if a
            # developer is tunneled in). If ssm-agent isn't reporting, assume 0.
            SSM_SESSIONS=$(pgrep -c -f "ssm-session-worker" 2>/dev/null || echo 0)

            # All three must be true to count as idle.
            if [ "${!GPU_UTIL:-0}" -lt 5 ] && [ "${!GPU_MEM:-0}" -lt 1024 ] && [ "${!SSM_SESSIONS:-0}" -eq 0 ]; then
              [ -f "$STATE" ] || date +%s > "$STATE"
              IDLE_HOURS=$(( ($(date +%s) - $(cat "$STATE")) / 3600 ))
              logger -t auto-shutdown "idle ${!IDLE_HOURS}h (gpu=${!GPU_UTIL}% mem=${!GPU_MEM}MB ssm=${!SSM_SESSIONS})"
              if [ "$IDLE_HOURS" -ge "$THRESHOLD_HOURS" ]; then
                logger -t auto-shutdown "threshold reached, stopping in 5 min"
                # `shutdown -h` triggers OS halt. With the launch template's
                # InstanceInitiatedShutdownBehavior: stop, the instance stops
                # (EBS retained) rather than terminates.
                shutdown -h +5 "Auto-shutdown after ${!IDLE_HOURS} idle hours"
              fi
            else
              rm -f "$STATE"
              logger -t auto-shutdown "active (gpu=${!GPU_UTIL}% mem=${!GPU_MEM}MB ssm=${!SSM_SESSIONS})"
            fi
            EOF
              sed -i "s/__HOURS__/${AutoShutdownHours}/" /usr/local/bin/auto-shutdown-check.sh
              chmod +x /usr/local/bin/auto-shutdown-check.sh
              echo "*/15 * * * * root /usr/local/bin/auto-shutdown-check.sh" >/etc/cron.d/auto-shutdown
            fi

            # Mark bootstrap complete. `make bootstrap` checks for this marker.
            touch /var/lib/cloud/instance/userdata-complete
            echo "=== Minimal bootstrap done: $(date -u) ==="
            echo "=== Next step: run 'make bootstrap' from your Mac to install training stack ==="

  # ---------------------------------------------------------------------------
  # The EC2 instance itself.
  # ---------------------------------------------------------------------------
  TrainingInstance:
    Type: AWS::EC2::Instance
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-training
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------------------------
  # SSM Document that installs the training stack AFTER the instance is up.
  # Triggered by `make bootstrap` (which calls aws ssm send-command).
  #
  # Why not in UserData: UserData fires once, fails silently as far as CFN is
  # concerned, and cannot be retried. SSM Run Command returns a structured
  # status per step, streams output to CloudWatch Logs, and can be re-invoked.
  # ---------------------------------------------------------------------------
  TrainingStackBootstrapDoc:
    Type: AWS::SSM::Document
    Properties:
      # Deliberately NOT setting Name: CloudFormation cannot update Content on
      # a named SSM Document without replacement, and replacement is blocked
      # when the resource has a custom Name. Letting CFN generate a name lets
      # updates proceed (a new doc is created, old one deleted). Consumers
      # look up the doc via the BootstrapDocumentName stack output.
      DocumentType: Command
      DocumentFormat: YAML
      TargetType: /AWS::EC2::Instance
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
      Content:
        schemaVersion: '2.2'
        description: >
          Install the emotion-companion training stack (uv, LLaMA-Factory,
          Unsloth, vLLM) on a DLAMI instance. Idempotent — safe to re-run.
        parameters:
          LlamaFactoryRef:
            type: String
            description: LLaMA-Factory git ref (commit/tag/branch).
            default: !Ref LlamaFactoryRef
        mainSteps:
          # -------- Step 1: install uv as the ubuntu user --------------------
          # NOTE: SSM Run Command shells default to /bin/sh (dash on Ubuntu),
          # which does NOT support `set -o pipefail`. Every step's first line
          # must be `#!/bin/bash` so the remaining bash-only syntax works.
          - action: aws:runShellScript
            name: InstallUv
            inputs:
              runAsElevated: false
              timeoutSeconds: 300
              workingDirectory: /home/ubuntu
              runCommand:
                - '#!/bin/bash'
                - 'set -euo pipefail'
                - 'if ! command -v /home/ubuntu/.local/bin/uv >/dev/null 2>&1; then'
                - '  sudo -u ubuntu bash -lc "curl -LsSf https://astral.sh/uv/install.sh | sh"'
                - 'fi'
                - 'sudo -u ubuntu bash -lc "grep -qxF ''export PATH=\"/home/ubuntu/.local/bin:\$PATH\"'' /home/ubuntu/.bashrc || echo ''export PATH=\"/home/ubuntu/.local/bin:\$PATH\"'' >> /home/ubuntu/.bashrc"'
                - '/home/ubuntu/.local/bin/uv --version'

          # -------- Step 2: build the TRAIN venv ---------------------------
          # Originally planned to reuse DLAMI's /opt/pytorch via
          # --system-site-packages, but LLaMA-Factory lists `torch>=2.4.0` in
          # its hard dependencies, so uv resolves and installs torch into the
          # venv regardless of inherited site-packages. We therefore build a
          # self-contained venv and pin CUDA wheels explicitly via PyTorch's
          # cu128 index (matching the DLAMI's CUDA 12.8 toolkit that ships with
          # NVIDIA driver 580.x, so nvcc/bitsandbytes stay compatible).
          # This costs ~5 min extra on first install and ~5 GB of disk, and
          # supersedes the "reuse DLAMI torch" guidance in ADR-0005 —
          # see ADR-0008 for the updated rationale.
          - action: aws:runShellScript
            name: CreateTrainVenv
            inputs:
              runAsElevated: false
              timeoutSeconds: 1800
              workingDirectory: /home/ubuntu
              runCommand:
                - '#!/bin/bash'
                - 'set -euo pipefail'
                - 'export PATH="/home/ubuntu/.local/bin:$PATH"'
                # IMPORTANT: pin the CUDA wheel index for the ENTIRE venv via
                # env var so every uv pip install in this venv uses cu128.
                # Passing --extra-index-url only on the first command allowed
                # subsequent LLaMA-Factory dep resolution to pull torch from
                # PyPI (CPU wheels), yielding a broken torch 2.10.0 vs
                # torchaudio 2.11.0+cu128 mismatch. The env var ensures
                # consistency across all subsequent resolves.
                - 'export UV_EXTRA_INDEX_URL="https://download.pytorch.org/whl/cu128"'
                - 'export UV_INDEX_STRATEGY="unsafe-best-match"'
                # Fresh venv using the DLAMI python (3.12) — no
                # system-site-packages, since we're installing our own torch.
                - 'sudo -u ubuntu bash -lc "set -euo pipefail; export PATH=/home/ubuntu/.local/bin:\$PATH; [ -d ~/venv-train ] || uv venv --python /opt/pytorch/bin/python ~/venv-train"'
                - 'sudo -u ubuntu bash -lc "set -euo pipefail; export PATH=/home/ubuntu/.local/bin:\$PATH; [ -d ~/LLaMA-Factory ] || git clone https://github.com/hiyouga/LLaMA-Factory.git ~/LLaMA-Factory; cd ~/LLaMA-Factory && git fetch --all --tags && git checkout {{ LlamaFactoryRef }}"'
                # Seed PEP 517 build backends so --no-build-isolation works.
                # LLaMA-Factory under-specifies build-system.requires (missing
                # `editables` that hatchling needs for editable installs).
                - 'sudo -u ubuntu bash -lc "set -euo pipefail; export PATH=/home/ubuntu/.local/bin:\$PATH; export UV_EXTRA_INDEX_URL=https://download.pytorch.org/whl/cu128; export UV_INDEX_STRATEGY=unsafe-best-match; source ~/venv-train/bin/activate && uv pip install hatchling editables setuptools wheel"'
                # Pin torch to the exact version Unsloth expects
                # (2.10.0+cu128). Unsloth's pre-compiled kernels require an
                # exact torch match and will silently downgrade the rest of the
                # stack otherwise, causing version drift across runs. See
                # ADR-0009 for why we chose Unsloth acceleration over the
                # LLaMA-Factory cpp-extension path that needs torch>=2.11.
                - 'sudo -u ubuntu bash -lc "set -euo pipefail; export PATH=/home/ubuntu/.local/bin:\$PATH; export UV_EXTRA_INDEX_URL=https://download.pytorch.org/whl/cu128; export UV_INDEX_STRATEGY=unsafe-best-match; source ~/venv-train/bin/activate && uv pip install torch==2.10.0+cu128 torchvision==0.25.0+cu128 torchaudio==2.10.0+cu128"'
                - 'sudo -u ubuntu bash -lc "set -euo pipefail; export PATH=/home/ubuntu/.local/bin:\$PATH; export UV_EXTRA_INDEX_URL=https://download.pytorch.org/whl/cu128; export UV_INDEX_STRATEGY=unsafe-best-match; source ~/venv-train/bin/activate && cd ~/LLaMA-Factory && uv pip install -e .[metrics,deepspeed] --no-build-isolation"'
                # Install bitsandbytes separately — LLaMA-Factory v0.9.4 does
                # not expose it as an extra (despite README mentioning it).
                - 'sudo -u ubuntu bash -lc "set -euo pipefail; export PATH=/home/ubuntu/.local/bin:\$PATH; export UV_EXTRA_INDEX_URL=https://download.pytorch.org/whl/cu128; export UV_INDEX_STRATEGY=unsafe-best-match; source ~/venv-train/bin/activate && uv pip install bitsandbytes"'
                - 'sudo -u ubuntu bash -lc "set -euo pipefail; export PATH=/home/ubuntu/.local/bin:\$PATH; export UV_EXTRA_INDEX_URL=https://download.pytorch.org/whl/cu128; export UV_INDEX_STRATEGY=unsafe-best-match; source ~/venv-train/bin/activate && uv pip install unsloth"'
                # Sanity check: torch/unsloth importable, CUDA live.
                - 'sudo -u ubuntu bash -lc "source ~/venv-train/bin/activate && python -c ''import torch, unsloth; assert torch.cuda.is_available(); print(f\"torch={torch.__version__} cuda={torch.version.cuda} unsloth={unsloth.__version__} device={torch.cuda.get_device_name(0)}\")''"'

          # -------- Step 3: build the SERVE venv (vLLM, isolated) ------------
          - action: aws:runShellScript
            name: CreateServeVenv
            inputs:
              runAsElevated: false
              timeoutSeconds: 1800
              workingDirectory: /home/ubuntu
              runCommand:
                - '#!/bin/bash'
                - 'set -euo pipefail'
                - 'sudo -u ubuntu bash -lc "set -euo pipefail; export PATH=/home/ubuntu/.local/bin:\$PATH; [ -d ~/venv-serve ] || uv venv --python 3.11 ~/venv-serve"'
                - 'sudo -u ubuntu bash -lc "set -euo pipefail; export PATH=/home/ubuntu/.local/bin:\$PATH; source ~/venv-serve/bin/activate && uv pip install vllm"'
                - 'sudo -u ubuntu bash -lc "source ~/venv-serve/bin/activate && python -c ''import vllm; print(f\"vllm={vllm.__version__}\")''"'

          # -------- Step 4: write a completion marker ------------------------
          - action: aws:runShellScript
            name: MarkComplete
            inputs:
              runAsElevated: true
              timeoutSeconds: 60
              runCommand:
                - '#!/bin/bash'
                - 'set -euo pipefail'
                - 'date -u +"%Y-%m-%dT%H:%M:%SZ" > /var/lib/cloud/instance/training-stack-ready'
                - 'chown ubuntu:ubuntu /var/lib/cloud/instance/training-stack-ready'
                - 'echo "Training stack bootstrap complete."'

  # Log group that SSM Run Command streams into. Name is project-scoped rather
  # than derived from the (CFN-generated) SSM Document name, so consumers can
  # reference a stable path across doc replacements.
  BootstrapLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /${ProjectName}/${Environment}/bootstrap
      RetentionInDays: 30

  # ---------------------------------------------------------------------------
  # Layer 2 auto-shutdown: CloudWatch alarm on low GPU utilization.
  #
  # Independent of the on-instance cron (Layer 1). If the OS hangs or the cron
  # dies, this layer still stops the instance. The `arn:aws:automate:<region>:
  # ec2:stop` ARN is a built-in CloudWatch alarm action (no Lambda needed).
  #
  # Metric source: CloudWatch agent's nvidia_gpu plugin (configured in UserData).
  # Namespace: EmotionCompanion (to match our agent config).
  # ---------------------------------------------------------------------------
  IdleGpuAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: EnableIdleAlarmCond
    Properties:
      AlarmName: !Sub ${ProjectName}-${Environment}-idle-gpu-stop
      AlarmDescription: >
        Stops the training instance when GPU utilization stays below 5% for
        60 consecutive minutes. Cost guardrail against forgotten instances.
      Namespace: EmotionCompanion
      MetricName: nvidia_gpu_utilization_gpu
      Dimensions:
        - Name: InstanceId
          Value: !Ref TrainingInstance
      Statistic: Maximum            # max over the period; even occasional spikes keep us awake
      Period: 300                   # 5 min
      EvaluationPeriods: 12         # 12 × 5 min = 60 min
      Threshold: 5
      ComparisonOperator: LessThanThreshold
      # Treat missing data as "notBreaching" so a CloudWatch-agent hiccup
      # doesn't accidentally trigger a stop.
      TreatMissingData: notBreaching
      AlarmActions:
        - !Sub arn:${AWS::Partition}:automate:${AWS::Region}:ec2:stop

  # ---------------------------------------------------------------------------
  # Cost guardrail: monthly budget alert (optional).
  # ---------------------------------------------------------------------------
  ProjectBudget:
    Type: AWS::Budgets::Budget
    Condition: HasBudgetEmail
    Properties:
      Budget:
        BudgetName: !Sub ${ProjectName}-${Environment}-monthly
        BudgetLimit:
          Amount: !Ref BudgetLimitUSD
          Unit: USD
        TimeUnit: MONTHLY
        BudgetType: COST
        CostFilters:
          TagKeyValue:
            - !Sub user:Project$${ProjectName}
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 80
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref BudgetNotificationEmail
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref BudgetNotificationEmail

# =============================================================================
# OUTPUTS
# =============================================================================
Outputs:
  InstanceId:
    Description: EC2 instance ID (use this for SSM sessions)
    Value: !Ref TrainingInstance
    Export:
      Name: !Sub ${AWS::StackName}-InstanceId

  ArtifactBucketName:
    Description: S3 bucket for datasets and LoRA adapters
    Value: !Ref ArtifactBucket
    Export:
      Name: !Sub ${AWS::StackName}-ArtifactBucket

  Region:
    Description: Deployment region
    Value: !Ref AWS::Region

  BootstrapLogGroup:
    Description: CloudWatch Logs group that collects bootstrap output
    Value: !Ref BootstrapLogGroup
    Export:
      Name: !Sub ${AWS::StackName}-BootstrapLogGroup

  SsmStartSessionCmd:
    Description: Command to start interactive shell via SSM
    Value: !Sub |
      aws ssm start-session --target ${TrainingInstance} --region ${AWS::Region}

  BootstrapDocumentName:
    Description: Name of the SSM Document that installs the training stack
    Value: !Ref TrainingStackBootstrapDoc
    Export:
      Name: !Sub ${AWS::StackName}-BootstrapDoc

  BootstrapCmd:
    Description: Command to run the training-stack bootstrap on the instance (post-deploy)
    Value: !Sub |
      aws ssm send-command --document-name ${TrainingStackBootstrapDoc} --targets Key=instanceids,Values=${TrainingInstance} --region ${AWS::Region}

  SsmTunnelCmd:
    Description: Command to tunnel webui(7860) + tensorboard(6006) + vllm(8000) to MacBook
    Value: !Sub |
      aws ssm start-session --target ${TrainingInstance} --region ${AWS::Region} --document-name AWS-StartPortForwardingSession --parameters '{"portNumber":["7860","6006","8000"],"localPortNumber":["7860","6006","8000"]}'

  SetHfTokenCmd:
    Description: Set your Hugging Face token (run once after stack creation)
    Value: !Sub |
      aws ssm put-parameter --name /${ProjectName}/${Environment}/hf-token --value "YOUR_HF_TOKEN_HERE" --type SecureString --overwrite --region ${AWS::Region}
